<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Anton&amp;family=Archivo:wght@400;500;600;700&amp;family=Big+Shoulders+Display:wght@500;600;700;800&amp;family=Gulzar&amp;family=IBM+Plex+Mono:wght@400;500;600&amp;display=swap" rel="stylesheet">
  <style>
    @keyframes bbMenuIn { from { opacity: 0; transform: translateY(38px); } to { opacity: 1; transform: none; } }
    @keyframes bbFadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</helmet>
<header aria-label="Site header" style="position:fixed;top:0;left:0;right:0;z-index:900">
  <div ref="{{ microRef }}" style="overflow:hidden;max-height:40px;opacity:1;transition:max-height .45s ease,opacity .45s ease;background:rgba(18,13,10,.55);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid rgba(242,233,221,.07)">
    <sc-if value="{{ desktop }}" hint-placeholder-val="{{ true }}">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:18px;padding:10px clamp(20px,4vw,56px);font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:#9C8D7F;white-space:nowrap">
        <span style="overflow:hidden;text-overflow:ellipsis">Lahore Rd, Hajian Wali — Burewala · Vehari · Punjab</span>
        <span style="display:flex;align-items:center;gap:24px">
          <span>Sat–Thu 06:00–18:00</span>
          <a href="tel:+923457721816" style="color:#C9BBAC;text-decoration:none">+92 345 7721816</a>
        </span>
      </div>
    </sc-if>
  </div>
  <div ref="{{ barRef }}" style="display:flex;align-items:center;justify-content:space-between;gap:20px;padding:15px clamp(20px,4vw,56px);background:transparent;border-bottom:1px solid transparent;transition:background .4s ease,border-color .4s ease">
    <a href="Home.dc.html" aria-label="Burewala Bricks — home" style="display:flex;align-items:center;gap:13px;text-decoration:none;flex:none">
      <img src="logo.png" alt="" style="width:46px;height:46px;flex:none;border-radius:50%;box-shadow:0 4px 14px rgba(0,0,0,.35)">
      <span style="display:flex;flex-direction:column;line-height:1">
        <span style="font-family:'Big Shoulders Display','Anton','Arial Narrow',sans-serif;font-weight:800;font-size:21px;letter-spacing:.09em;color:#F2E9DD">BUREWALA BRICKS</span>
        <span style="font-family:'IBM Plex Mono',monospace;font-size:8.5px;letter-spacing:.36em;color:#9C8D7F;margin-top:4px">EST. 1983 — بورے والا برکس</span>
      </span>
    </a>
    <sc-if value="{{ desktop }}" hint-placeholder-val="{{ true }}">
      <nav aria-label="Primary" style="display:flex;align-items:center;gap:clamp(14px,1.5vw,24px)">
        <sc-for list="{{ links }}" as="l" hint-placeholder-count="8">
          <a href="{{ l.href }}" style="{{ l.linkStyle }}" style-hover="{{ l.hoverStyle }}">{{ l.label }}</a>
        </sc-for>
      </nav>
      <a href="Contact.dc.html#quote" style="flex:none;display:inline-flex;align-items:center;gap:9px;background:var(--bbA,#E4592B);color:#150F0B;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;padding:13px 18px;text-decoration:none;transition:background .25s ease,transform .25s ease" style-hover="background:#FF7B42;transform:translateY(-2px)">Today's Rate <span aria-hidden="true">→</span></a>
    </sc-if>
    <sc-if value="{{ mobile }}" hint-placeholder-val="{{ false }}">
      <button onClick="{{ toggle }}" aria-label="Open menu" style="background:transparent;border:1px solid rgba(242,233,221,.3);color:#F2E9DD;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;padding:12px 16px;cursor:pointer">{{ burgerLabel }}</button>
    </sc-if>
  </div>
  <sc-if value="{{ open }}" hint-placeholder-val="{{ false }}">
    <div role="dialog" aria-label="Menu" style="position:fixed;inset:0;z-index:950;background:#120D0A;display:flex;flex-direction:column;overflow:auto;animation:bbFadeIn .3s ease both">
      <div style="position:absolute;inset:0;pointer-events:none;background:radial-gradient(70% 45% at 50% 115%,rgba(226,88,32,.28),transparent 70%)"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding:15px clamp(20px,4vw,56px);border-bottom:1px solid rgba(242,233,221,.1)">
        <span style="display:inline-flex;align-items:center;gap:12px"><img src="logo.png" alt="" style="width:40px;height:40px;border-radius:50%"><span style="font-family:'Big Shoulders Display','Anton',sans-serif;font-weight:800;font-size:20px;letter-spacing:.09em;color:#F2E9DD">BUREWALA BRICKS</span></span>
        <button onClick="{{ toggle }}" aria-label="Close menu" style="background:transparent;border:1px solid rgba(242,233,221,.3);color:#F2E9DD;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;padding:12px 16px;cursor:pointer">Close ✕</button>
      </div>
      <nav aria-label="Menu links" style="flex:1;display:flex;flex-direction:column;justify-content:center;padding:32px clamp(20px,6vw,72px)">
        <sc-for list="{{ links }}" as="l" hint-placeholder-count="8">
          <a href="{{ l.href }}" style="{{ l.menuStyle }}" style-hover="{{ l.menuHover }}">
            <span style="font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.2em;color:var(--bbA,#E4592B);width:34px;flex:none">{{ l.idx }}</span>
            <span>{{ l.label }}</span>
            <span aria-hidden="true" style="margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:16px;opacity:.4">↗</span>
          </a>
        </sc-for>
      </nav>
      <div style="display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:16px;padding:22px clamp(20px,6vw,72px);border-top:1px solid rgba(242,233,221,.1)">
        <a href="tel:+923457721816" style="font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.12em;color:#C9BBAC;text-decoration:none">+92 345 7721816</a>
        <span style="font-family:'Gulzar','Noto Nastaliq Urdu',serif;font-size:22px;color:#9C8D7F;line-height:1.9">بورے والا برکس</span>
        <a href="https://wa.me/923457721816?text=Assalam%20o%20Alaikum%20Burewala%20Bricks!%20Please%20share%20today%27s%20brick%20rates." target="_blank" rel="noopener" style="font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#150F0B;background:#4FBF67;padding:12px 18px;text-decoration:none">WhatsApp ↗</a>
      </div>
    </div>
  </sc-if>
</header>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 1440, &quot;height&quot;: 120}, &quot;active&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;home&quot;, &quot;about&quot;, &quot;products&quot;, &quot;process&quot;, &quot;zigzag&quot;, &quot;gallery&quot;, &quot;projects&quot;, &quot;contact&quot;], &quot;default&quot;: &quot;home&quot;, &quot;tsType&quot;: &quot;string&quot;}}">
class Component extends DCLogic {
  state = { open: false, mobile: false };
  barRef = React.createRef();
  microRef = React.createRef();

  componentDidMount() {
    this._onResize = () => {
      const m = window.innerWidth < 1180;
      if (m !== this.state.mobile) this.setState({ mobile: m, open: this.state.open && m });
    };
    this._onResize();
    window.addEventListener('resize', this._onResize);

    this._scrolled = null;
    this._onScroll = () => {
      const s = window.scrollY > 26;
      if (s === this._scrolled) return;
      this._scrolled = s;
      const b = this.barRef.current;
      if (b) {
        b.style.background = s ? 'rgba(18,13,10,.88)' : 'transparent';
        b.style.backdropFilter = s ? 'blur(16px) saturate(1.05)' : 'none';
        b.style.webkitBackdropFilter = s ? 'blur(16px) saturate(1.05)' : 'none';
        b.style.borderBottomColor = s ? 'rgba(242,233,221,.1)' : 'transparent';
      }
      const m = this.microRef.current;
      if (m) {
        m.style.maxHeight = s ? '0px' : '40px';
        m.style.opacity = s ? '0' : '1';
      }
    };
    window.addEventListener('scroll', this._onScroll, { passive: true });
    this._onScroll();
  }

  componentWillUnmount() {
    window.removeEventListener('resize', this._onResize);
    window.removeEventListener('scroll', this._onScroll);
    document.body.style.overflow = '';
  }

  _setOpen(open) {
    this.setState({ open });
    document.body.style.overflow = open ? 'hidden' : '';
  }

  renderVals() {
    const active = this.props.active || '';
    const base = [
      { id: 'home', label: 'Home', href: 'Home.dc.html' },
      { id: 'about', label: 'About', href: 'About.dc.html' },
      { id: 'products', label: 'Bricks', href: 'Products.dc.html' },
      { id: 'process', label: 'Process', href: 'Process.dc.html' },
      { id: 'zigzag', label: 'Zigzag Kiln', href: 'Zigzag.dc.html' },
      { id: 'gallery', label: 'Gallery', href: 'Gallery.dc.html' },
      { id: 'projects', label: 'Projects', href: 'Projects.dc.html' },
      { id: 'contact', label: 'Contact', href: 'Contact.dc.html' },
    ];
    const links = base.map((l, i) => {
      const on = l.id === active;
      return {
        ...l,
        on,
        idx: '0' + (i + 1),
        linkStyle: {
          fontFamily: "'IBM Plex Mono',monospace",
          fontSize: '11.5px',
          letterSpacing: '.14em',
          textTransform: 'uppercase',
          textDecoration: 'none',
          color: on ? 'var(--bbA,#FF7B42)' : '#D8CCBD',
          paddingBottom: '5px',
          borderBottom: on ? '1px solid currentColor' : '1px solid transparent',
          transition: 'color .25s ease',
          whiteSpace: 'nowrap',
        },
        hoverStyle: { color: '#FF7B42' },
        menuStyle: {
          display: 'flex',
          alignItems: 'center',
          gap: '18px',
          textDecoration: 'none',
          color: on ? 'var(--bbA,#FF7B42)' : '#F2E9DD',
          fontFamily: "'Big Shoulders Display','Anton','Arial Narrow',sans-serif",
          fontWeight: 800,
          fontSize: 'clamp(34px,7.5vw,58px)',
          lineHeight: 1,
          letterSpacing: '.03em',
          textTransform: 'uppercase',
          padding: '16px 4px',
          borderBottom: '1px solid rgba(242,233,221,.1)',
          animation: 'bbMenuIn .65s cubic-bezier(.16,1,.3,1) both',
          animationDelay: (0.04 + i * 0.05) + 's',
          transition: 'color .2s ease,padding-left .25s ease',
        },
        menuHover: { color: '#FF7B42', paddingLeft: '14px' },
      };
    });
    return {
      links,
      open: this.state.open,
      mobile: this.state.mobile,
      desktop: !this.state.mobile,
      burgerLabel: this.state.open ? 'Close' : 'Menu ☰',
      toggle: () => this._setOpen(!this.state.open),
      barRef: this.barRef,
      microRef: this.microRef,
    };
  }
}
</script>
</body>
</html>
